<div ng-if="vm.ui.loadingItems" layout="column" layout-align="center center">
  <md-progress-circular class="md-accent" md-mode="indeterminate" md-diameter="64"></md-progress-circular>
  <div>Cargando registros...</div>
</div>

<div ng-if="!vm.ui.loadingItems && vm.items.length === 0">No hay registros</div>

<div ng-if="!vm.ui.loadingItems && vm.items.length > 0 && !vm.ui.loadingCurrentItem"
  ng-include="'app/main/reports/acum/partials/list-items.partial.html'" layout="column" flex="100" layout-align="start">
</div>
