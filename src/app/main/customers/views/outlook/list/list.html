<div ng-if="vm.ui.loadingItems" layout="column" layout-align="center center">
  <md-progress-circular class="md-accent" md-mode="indeterminate" md-diameter="64"></md-progress-circular>
  <div>Cargando clientes...</div>
</div>

<div ng-if="!vm.ui.loadingItems && vm.items.length === 0 && !vm.currentItem">No hay obras</div>

<div ng-if="!vm.ui.loadingItems && vm.items.length > 0" ng-include="'app/main/customers/partials/list-items.partial.html'"></div>
