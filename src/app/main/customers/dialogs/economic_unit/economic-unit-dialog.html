<md-dialog class="economic-unit-dialog" aria-label="dialog">

  <form name="form" class="md-inline-form" novalidate>
    <!-- DIALOG TOOLBAR -->
    <md-toolbar layout="column" ng-class="{'md-accent': vm.item.active, 'md-warn': !vm.item.active}">

      <!-- TOOLBAR TOP -->
      <div class="md-toolbar-tools md-toolbar-tools-top" layout="row" layout-align="space-between">
        <span class="title"><md-icon md-font-icon="icon-cog" class="icon" style="margin-right: 12px; padding-bottom: 28px"></md-icon>Unidad Economica</span>
        <md-button class="md-icon-button" ng-click="vm.cancel()" aria-label="close dialog">
          <md-icon md-font-icon="icon-close"></md-icon>
        </md-button>
      </div>
      <!-- / TOOLBAR TOP -->

    </md-toolbar>
    <!-- / DIALOG TOOLBAR -->

    <md-dialog-content ms-scroll>
      <md-input-container class="md-icon-float md-block">
        <label>Nombre</label>
        <input ng-model="vm.item.name" type="text" required md-maxlength="64">
      </md-input-container>
    </md-dialog-content>
    <md-dialog-actions layout="row" layout-align="center" style="height: 12px">
      <div layout="row" layout-align="start center">
        <md-button type="submit" ng-click="vm.save()" class="send-button md-raised" ng-class="{'md-accent': vm.item.active, 'md-warn': !vm.item.active}" ng-disabled="form.$invalid || form.$pristine" aria-label="SAVE">
          GUARDAR
        </md-button>
      </div>
      <div layout="row" layout-align="start center">
        <md-input-container class="md-icon-float md-block">
          <md-tooltip ng-if="!vm.item.active"><span>Activar</span></md-tooltip>
          <md-tooltip ng-if="vm.item.active"><span>Desactivar</span></md-tooltip>
          <md-switch ng-model="vm.item.active" aria-label="set active"></md-switch>
        </md-input-container>
        <md-button ng-if="!vm.new" class="md-icon-button md-warn" aria-label="delete" ng-click="vm.remove()">
          <md-icon md-font-icon="icon-delete"></md-icon>
          <md-tooltip><span>Eliminar definitivamente</span></md-tooltip>
        </md-button>
      </div>
    </md-dialog-actions>
  </form>

</md-dialog>
